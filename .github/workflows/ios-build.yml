name: iOS Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios
          
      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      - name: Build Unsigned App
        run: |
          xcodebuild -workspace ios/*.xcworkspace -scheme ghost-vault -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build
          
      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r GhostVault.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostVault-Unsigned-IPA
          path: GhostVault.ipa
