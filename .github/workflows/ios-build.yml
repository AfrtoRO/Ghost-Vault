name: iOS Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Build Unsigned App
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk '/Schemes:/{getline; print $1}')
          echo "Building scheme: $SCHEME in workspace: $WORKSPACE"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath ../build || exit 1
          
      - name: Package into IPA
        run: |
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload/
          zip -r GhostVault.ipa Payload
          mv GhostVault.ipa ../../../../
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostVault-Unsigned-IPA
          path: GhostVault.ipa
